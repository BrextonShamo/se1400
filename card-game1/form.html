<html lang="en">
    <body>
        <div id="wrapper">
            <div class="backgroundimage">
            </div>
            <main>
                <form method="post" action="form.html" name="contact">
                    <label for="name">First Name:</label> <input type="text" name="name" id="name" required size="50"><br>
                    <label for="email">Email:</label> <input type="email" name="email" id="email"><br>
                    <label for="date">Date:</label> <input type="date" name="date" id="date"><br>
                    <label for="password">Password:</label> <input type="password" name="password" id="password"><br>
                    <label for="tel">Phone:</label> <input type="tel" name="tel" id="tel" placeholder="123-456-7890"><br>
                    <label for="radio">What is your favorite cardgame?</label><br>
                    <input type="radio" name="cardgame" value="cardgame">Poker<br>
                    <input type="radio" name="cardgame" value="cardgame">Uno<br>
                    <input type="radio" name="cardgame" value="cardgame">Speed<br>
                    <label for="comments">Comments</label><br>
                    <textarea></textarea><br>
                    <input type="submit" name="submit" value="Send">
                    <input type="reset" name="reset" value="Clear">

                </form>
            </main>
        </div>
    </body>
